# yaml-language-server: $schema=https://app.stainless.com/config.schema.json

edition: 2025-10-10

organization:
  name: agent.pw
  docs: 'https://agent.pw/docs'
  contact: 'contact@smithery.ai'

targets:
  typescript:
    edition: typescript.2025-10-10
    package_name: '@agent.pw/sdk'
    production_repo: null
    staging_repo: 'stainless-sdks/agent.pw-typescript'
    publish:
      npm:
        auth_method: oidc

environments:
  production: https://api.agent.pw

resources:
  health:
    methods:
      check: get /

  profiles:
    methods:
      list: get /cred_profiles
      get: get /cred_profiles/{slug}
      create: put /cred_profiles/{slug}
      delete: delete /cred_profiles/{slug}

  credentials:
    methods:
      list: get /credentials
      store: put /credentials/{slug}
      delete: delete /credentials/{slug}

  tokens:
    methods:
      revoke: post /tokens/revoke

settings:
  disable_mock_tests: true
  license: Apache-2.0

client_settings:
  opts:
    api_key:
      type: string
      nullable: false
      auth:
        security_scheme: bearerAuth
      description: agent.pw Biscuit token sent in the agentpw-token header
      read_env: AGENT_PW_API_KEY

readme:
  example_requests:
    default:
      type: request
      endpoint: get /
      params: {}
    headline:
      type: request
      endpoint: get /cred_profiles
      params: {}
