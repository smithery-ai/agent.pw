name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build && pnpm --filter agent.pw build
      - name: Bundle CLI
        run: pnpm --filter agent.pw compile
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test

  stainless-upload:
    name: Upload OpenAPI to Stainless
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate OpenAPI spec
        run: pnpm run openapi:generate
      - name: Upload OpenAPI spec to Stainless
        uses: stainless-api/upload-openapi-spec-action@v1
        with:
          input_path: openapi.json
          config_path: openapi.stainless.yml
          project_name: agent.pw
          commit_message: "${{ github.event.head_commit.message }}"

  stainless-preview:
    name: Stainless Preview Build
    needs: build-and-test
    if: github.event_name == 'pull_request' && github.actor != 'smithery-chore-bot[bot]' && !contains(github.event.pull_request.labels.*.name, 'skip-stainless')
    concurrency:
      group: stainless-preview-${{ github.head_ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2
          token: ${{ steps.app-token.outputs.token }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate OpenAPI spec
        run: pnpm run openapi:generate
      - name: Commit openapi.json
        id: openapi-commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- openapi.json; then
            echo "stale=false" >> $GITHUB_OUTPUT
            echo "No changes to openapi.json, skipping commit"
            exit 0
          fi

          BASE_SHA=$(git rev-parse HEAD)
          git commit -m "chore: generated openapi.json for Stainless preview" --no-verify --only -- openapi.json

          if git push --force-with-lease=refs/heads/${{ github.head_ref }}:$BASE_SHA origin HEAD:${{ github.head_ref }}; then
            echo "stale=false" >> $GITHUB_OUTPUT
          else
            echo "Preview branch advanced; skipping stale openapi push"
            echo "stale=true" >> $GITHUB_OUTPUT
          fi
      - name: Upload OpenAPI spec for preview
        if: steps.openapi-commit.outputs.stale != 'true'
        id: stainless-build
        uses: stainless-api/upload-openapi-spec-action/preview@v1
        with:
          org: agent.pw
          project: agent.pw
          oas_path: openapi.json
          config_path: openapi.stainless.yml
      - name: Update @agent.pw/sdk to preview build
        if: steps.openapi-commit.outputs.stale != 'true'
        id: sdk-update
        env:
          STAINLESS_OUTCOMES: ${{ steps.stainless-build.outputs.outcomes }}
        run: |
          INSTALL_URL=$(echo "$STAINLESS_OUTCOMES" | jq -r '.typescript.install_url // empty')
          if [ -z "$INSTALL_URL" ]; then
            echo "No install_url found for TypeScript SDK, skipping update"
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Updating @agent.pw/sdk to: $INSTALL_URL"

          OLD_PATTERN='https://pkg\.stainless\.com/s/agent\.pw-typescript/[a-f0-9]\+/dist\.tar\.gz'
          sed -i "s|${OLD_PATTERN}|${INSTALL_URL}|g" packages/cli/package.json

          if git diff --quiet -- packages/cli/package.json; then
            echo "SDK URL unchanged, skipping"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Install dependencies with updated SDK
        if: steps.openapi-commit.outputs.stale != 'true' && steps.sdk-update.outputs.changed == 'true'
        run: pnpm install --no-frozen-lockfile
      - name: Commit and push SDK update
        if: steps.openapi-commit.outputs.stale != 'true' && steps.sdk-update.outputs.changed == 'true'
        run: |
          BASE_SHA=$(git rev-parse HEAD)
          git commit -m "chore: update @agent.pw/sdk to latest preview build" --only -- packages/cli/package.json pnpm-lock.yaml
          if ! git push --force-with-lease=refs/heads/${{ github.head_ref }}:$BASE_SHA origin HEAD:${{ github.head_ref }}; then
            echo "Preview branch advanced; skipping stale SDK push"
          fi
