name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint (Biome)
        run: pnpm lint

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm test

  stainless-upload:
    name: Upload OpenAPI to Stainless
    needs: [build, lint, test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate OpenAPI spec
        run: pnpm run openapi:generate
      - name: Upload OpenAPI spec to Stainless
        uses: stainless-api/upload-openapi-spec-action@v1
        with:
          input_path: openapi.json
          config_path: openapi.stainless.yml
          project_name: agent-pw
          commit_message: "${{ github.event.head_commit.message }}"

  stainless-preview:
    name: Stainless Preview Build
    needs: [build, lint, test]
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'skip-stainless')
    concurrency:
      group: stainless-preview-${{ github.head_ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate OpenAPI spec
        run: pnpm run openapi:generate
      - name: Commit openapi.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openapi.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: generated openapi.json for Stainless preview" --no-verify
            git push origin HEAD:${{ github.head_ref }}
          else
            echo "No changes to openapi.json, skipping commit"
          fi
      - name: Upload OpenAPI spec for preview
        id: stainless-build
        uses: stainless-api/upload-openapi-spec-action/preview@v1
        with:
          org: agent-pw
          project: agent-pw
          oas_path: openapi.json
          config_path: openapi.stainless.yml

