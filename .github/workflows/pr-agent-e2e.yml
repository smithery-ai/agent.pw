name: PR Agent E2E

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-agent-e2e-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  checks: read
  contents: read
  id-token: write
  pull-requests: write
  issues: write

jobs:
  agent-e2e:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Wait for successful Cloudflare preview check
        id: cloudflare
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const PRODUCTION_URL = 'https://warden.run'

            function parsePreviewUrl(summary) {
              if (!summary) return null
              const aliasMatch = summary.match(/Preview Alias URL:\s*(https?:\/\/\S+)/i)
              if (aliasMatch?.[1]) return aliasMatch[1].trim()
              const previewMatch = summary.match(/Preview URL:\s*(https?:\/\/\S+)/i)
              if (previewMatch?.[1]) return previewMatch[1].trim()
              return null
            }

            const owner = context.repo.owner
            const repo = context.repo.repo
            const headSha = context.payload.pull_request.head.sha
            const prNumber = context.payload.pull_request.number
            const maxAttempts = 60
            const delayMs = 15000
            let matchedCheckRun = null

            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
              const { data } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: headSha,
                per_page: 100,
              })

              matchedCheckRun = data.check_runs.find(cr =>
                cr.app?.slug === 'cloudflare-workers-and-pages' &&
                typeof cr.name === 'string' &&
                cr.name.startsWith('Workers Builds:'),
              )

              if (!matchedCheckRun) {
                core.info(`Attempt ${attempt}/${maxAttempts}: waiting for Cloudflare check run on ${headSha}.`)
              } else if (matchedCheckRun.status !== 'completed') {
                core.info(
                  `Attempt ${attempt}/${maxAttempts}: Cloudflare check is ${matchedCheckRun.status}.`,
                )
              } else if (matchedCheckRun.conclusion !== 'success') {
                throw new Error(
                  `Cloudflare check completed with conclusion=${matchedCheckRun.conclusion}.`,
                )
              } else {
                const previewUrl = parsePreviewUrl(matchedCheckRun.output?.summary ?? '') || PRODUCTION_URL
                if (previewUrl === PRODUCTION_URL) {
                  core.warning('Preview URL not found in Cloudflare check summary; falling back to production URL.')
                }
                core.setOutput('preview_url', previewUrl)
                core.setOutput(
                  'check_run_url',
                  matchedCheckRun.details_url || matchedCheckRun.html_url || '',
                )
                core.setOutput('pr_number', String(prNumber))
                core.info(`PR #${prNumber}, preview: ${previewUrl}`)
                return
              }

              if (attempt < maxAttempts) {
                await new Promise(resolve => setTimeout(resolve, delayMs))
              }
            }

            throw new Error(
              `Timed out waiting for successful Cloudflare preview check for ${headSha}.`,
            )

      - name: Short preview readiness probe
        env:
          PREVIEW_URL: ${{ steps.cloudflare.outputs.preview_url }}
        run: |
          set -euo pipefail
          for i in $(seq 1 12); do
            code="$(curl -sS -o /tmp/e2e-ready-body.txt -w '%{http_code}' "${PREVIEW_URL}/" || true)"
            echo "Attempt ${i}/12: ${code}"
            if [ "${code}" = "200" ] || [ "${code}" = "401" ] || [ "${code}" = "404" ]; then
              echo "Preview is reachable."
              exit 0
            fi
            sleep 10
          done
          echo "Preview URL did not become reachable in time: ${PREVIEW_URL}"
          exit 1

      - name: Build e2e agent prompt
        id: prompt
        env:
          PREVIEW_URL: ${{ steps.cloudflare.outputs.preview_url }}
        run: |
          mkdir -p .context
          PROMPT_FILE="$RUNNER_TEMP/e2e-agent-prompt.txt"

          cat > "$PROMPT_FILE" <<EOF
          You are a CI end-to-end test agent for the Warden API.

          Target preview URL:
          ${PREVIEW_URL}

          Your task:
          1. Use terminal commands (curl) to perform real HTTP requests against that preview.
          2. Use the LINEAR_TEST_KEY environment variable as the API key credential.
             Do not print the key value, do not include it in files, and do not echo it.
          3. Run these required checks in order:

             A. Discovery (triggers doc generation pipeline):
               GET {base}/api.linear.app with header Accept: application/json
               PASS only if:
               - HTTP status is exactly 401
               - JSON includes auth_url and poll_url

             B. Auth submit:
               POST to auth_url with JSON body {"api_key": "\$LINEAR_TEST_KEY"}
               PASS only if HTTP status is 200 and response includes token

             C. Poll completion:
               GET poll_url
               PASS only if HTTP status is 200 and status is "completed" with token

             D. Authenticated query through proxy:
               POST {base}/api.linear.app/graphql with Authorization: Bearer <warden token>
               Content-Type: application/json
               Body:
               {"query":"query LastEditedIssue { issues(first: 1, orderBy: updatedAt) { nodes { identifier title updatedAt url state { name } assignee { name } } } }"}
               PASS only if:
               - HTTP status is 200
               - JSON includes data.issues.nodes[0]

             E. Discovery doc generation (poll for generated docs):
               The initial GET in step A triggers the discovery pipeline.
               Wait up to 90 seconds, polling every 10 seconds:
               GET {base}/api.linear.app/docs/
               PASS if HTTP status is 200 and JSON includes "level" field.
               If it doesn't appear within 90s, mark as FAIL but continue.

             F. Discovery meta:
               GET {base}/api.linear.app/_meta.json
               PASS if HTTP status is 200 and JSON is valid.
               If 404, mark as FAIL but continue.

          4. Mark overall result as PASS only if checks A-D all pass.
             Checks E-F are informational (report pass/fail but don't block overall status).
          5. Extract latest ticket from the GraphQL result and include:
             identifier, title, updatedAt, url, state name, assignee name (if present).
          6. Write result JSON to .context/e2e-agent-result.json with this shape:
             {
               "status": "pass" | "fail",
               "summary": "short single-line summary",
               "preview_url": "...",
               "latest_ticket": {
                 "identifier": "ABC-123",
                 "title": "...",
                 "updatedAt": "...",
                 "url": "...",
                 "state": "...",
                 "assignee": "..."
               },
               "checks": [
                 {
                   "name": "...",
                   "request": "...",
                   "status_code": 200,
                   "pass": true,
                   "details": "..."
                 }
               ]
             }
          7. Write a PR comment draft to .context/e2e-pr-comment.md.
             The comment MUST begin with this marker:
             <!-- warden-agent-e2e -->
             Then include:
             - Title: "## Agent E2E: PASS" or "## Agent E2E: FAIL"
             - Preview URL
             - Latest ticket block with identifier, title, updatedAt, url, state, assignee (or "N/A")
             - A markdown table with each check, status code, and pass/fail
             - A short summary paragraph

          Important constraints:
          - Only write files under .context/
          - Do not edit source files
          - Be concise and factual
          EOF

          {
            echo "value<<EOF"
            cat "$PROMPT_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure LINEAR_TEST_KEY secret is present
        env:
          LINEAR_TEST_KEY: ${{ secrets.LINEAR_TEST_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${LINEAR_TEST_KEY:-}" ]; then
            echo "LINEAR_TEST_KEY secret is not configured."
            exit 1
          fi

      - name: Ensure BEDROCK_API_KEY secret is present
        env:
          BEDROCK_API_KEY: ${{ secrets.BEDROCK_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${BEDROCK_API_KEY:-}" ]; then
            echo "BEDROCK_API_KEY secret is not configured."
            exit 1
          fi

      - name: Install pinned Claude Code CLI
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code@2.1.18
          CLAUDE_BIN="$(command -v claude)"
          echo "CLAUDE_PATH=${CLAUDE_BIN}" >> "${GITHUB_ENV}"
          claude --version

      - name: Run Claude Haiku 4.5 e2e agent
        id: run-agent
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.BEDROCK_API_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
          LINEAR_TEST_KEY: ${{ secrets.LINEAR_TEST_KEY }}
        with:
          prompt: ${{ steps.prompt.outputs.value }}
          github_token: ${{ github.token }}
          path_to_claude_code_executable: ${{ env.CLAUDE_PATH }}
          use_bedrock: "true"
          claude_args: |
            --dangerously-skip-permissions
            --max-turns 20
            --model anthropic.claude-haiku-4-5-20251001-v1:0
          show_full_output: "false"

      - name: Deterministic e2e fallback (if Claude step fails)
        if: steps.run-agent.outcome != 'success'
        env:
          PREVIEW_URL: ${{ steps.cloudflare.outputs.preview_url }}
          LINEAR_TEST_KEY: ${{ secrets.LINEAR_TEST_KEY }}
        run: |
          set -euo pipefail
          mkdir -p .context
          node <<'NODE'
          const fs = require('node:fs')

          const marker = '<!-- warden-agent-e2e -->'
          const base = (process.env.PREVIEW_URL || '').replace(/\/+$/, '')
          const linearKey = process.env.LINEAR_TEST_KEY || ''
          const checks = []
          let allPass = true
          let latestTicket = null

          function pushCheck(name, request, statusCode, pass, details) {
            checks.push({
              name,
              request,
              status_code: statusCode,
              pass,
              details: details || '',
            })
            if (!pass) allPass = false
          }

          async function fetchJson(url, init = {}) {
            const res = await fetch(url, init)
            const text = await res.text()
            let json = null
            try {
              json = JSON.parse(text)
            } catch {}
            return { status: res.status, json, text }
          }

          async function run() {
            try {
              const discovery = await fetchJson(`${base}/api.linear.app`, {
                headers: { Accept: 'application/json' },
              })
              const authUrl = discovery.json?.auth_url
              const pollUrl = discovery.json?.poll_url
              pushCheck(
                'Discovery',
                `GET ${base}/api.linear.app`,
                discovery.status,
                discovery.status === 401 && typeof authUrl === 'string' && typeof pollUrl === 'string',
                `auth_url=${typeof authUrl === 'string'}, poll_url=${typeof pollUrl === 'string'}`,
              )

              let authToken = null
              let pollToken = null

              if (typeof authUrl === 'string') {
                const auth = await fetchJson(authUrl, {
                  method: 'POST',
                  headers: { Accept: 'application/json', 'Content-Type': 'application/json' },
                  body: JSON.stringify({ api_key: linearKey }),
                })
                authToken = auth.json?.token ?? null
                pushCheck(
                  'Auth submit',
                  `POST ${authUrl}`,
                  auth.status,
                  auth.status === 200 && typeof authToken === 'string' && authToken.length > 0,
                  `token_present=${typeof authToken === 'string' && authToken.length > 0}`,
                )
              } else {
                pushCheck('Auth submit', 'POST <missing auth_url>', 0, false, 'auth_url missing from discovery')
              }

              let poll = { status: 0, json: null }
              if (typeof pollUrl === 'string') {
                poll = await fetchJson(pollUrl, { headers: { Accept: 'application/json' } })
                pollToken = poll.json?.token ?? null
                pushCheck(
                  'Poll completion',
                  `GET ${pollUrl}`,
                  poll.status,
                  poll.status === 200 &&
                    (poll.json?.status === 'completed' || poll.json?.state === 'completed') &&
                    typeof (pollToken || authToken) === 'string',
                  `status=${poll.json?.status ?? poll.json?.state ?? 'unknown'}, token_present=${typeof (pollToken || authToken) === 'string'}`,
                )
              } else {
                pushCheck('Poll completion', 'GET <missing poll_url>', 0, false, 'poll_url missing from discovery')
              }

              const wardenToken = pollToken || authToken
              const gqlQuery =
                'query LastEditedIssue { issues(first: 1, orderBy: updatedAt) { nodes { identifier title updatedAt url state { name } assignee { name } } } }'
              if (typeof wardenToken === 'string' && wardenToken.length > 0) {
                const gql = await fetchJson(`${base}/api.linear.app/graphql`, {
                  method: 'POST',
                  headers: {
                    Accept: 'application/json',
                    'Content-Type': 'application/json',
                    Authorization: `Bearer ${wardenToken}`,
                  },
                  body: JSON.stringify({ query: gqlQuery }),
                })
                const node = gql.json?.data?.issues?.nodes?.[0]
                if (node) {
                  latestTicket = {
                    identifier: node.identifier ?? 'N/A',
                    title: node.title ?? 'N/A',
                    updatedAt: node.updatedAt ?? 'N/A',
                    url: node.url ?? 'N/A',
                    state: node.state?.name ?? 'N/A',
                    assignee: node.assignee?.name ?? 'N/A',
                  }
                }
                pushCheck(
                  'GraphQL latest ticket',
                  `POST ${base}/api.linear.app/graphql`,
                  gql.status,
                  gql.status === 200 && !!node,
                  `node_present=${!!node}`,
                )
              } else {
                pushCheck(
                  'GraphQL latest ticket',
                  `POST ${base}/api.linear.app/graphql`,
                  0,
                  false,
                  'missing warden token',
                )
              }

              // Discovery doc generation check (poll for generated docs)
              let docsPass = false
              for (let i = 0; i < 9; i++) {
                const docs = await fetchJson(`${base}/api.linear.app/docs/`, {
                  headers: { Accept: 'application/json' },
                })
                if (docs.status === 200 && docs.json?.level !== undefined) {
                  pushCheck(
                    'Discovery docs',
                    `GET ${base}/api.linear.app/docs/`,
                    docs.status,
                    true,
                    `Found docs after ${(i + 1) * 10}s`,
                  )
                  docsPass = true
                  break
                }
                await new Promise(r => setTimeout(r, 10000))
              }
              if (!docsPass) {
                const docs = await fetchJson(`${base}/api.linear.app/docs/`, {
                  headers: { Accept: 'application/json' },
                })
                pushCheck(
                  'Discovery docs',
                  `GET ${base}/api.linear.app/docs/`,
                  docs.status,
                  false,
                  'Docs not generated within 90s (informational)',
                )
              }

              // Discovery meta check
              const meta = await fetchJson(`${base}/api.linear.app/_meta.json`, {
                headers: { Accept: 'application/json' },
              })
              pushCheck(
                'Discovery meta',
                `GET ${base}/api.linear.app/_meta.json`,
                meta.status,
                meta.status === 200 && meta.json !== null,
                meta.status === 200 ? 'Meta available' : 'Meta not yet generated (informational)',
              )
            } catch (err) {
              pushCheck('Fallback runtime', 'local fallback', 0, false, String(err))
            }
          }

          run().then(() => {
            const status = allPass && latestTicket?.identifier ? 'pass' : 'fail'
            const summary =
              status === 'pass'
                ? 'Fallback e2e succeeded: Linear auth and latest ticket query passed.'
                : 'Fallback e2e failed: at least one required check did not pass.'

            const result = {
              status,
              summary,
              preview_url: base,
              latest_ticket: latestTicket,
              checks,
            }
            fs.writeFileSync('.context/e2e-agent-result.json', `${JSON.stringify(result, null, 2)}\n`, 'utf8')

            const ticket = latestTicket || {
              identifier: 'N/A',
              title: 'N/A',
              updatedAt: 'N/A',
              url: 'N/A',
              state: 'N/A',
              assignee: 'N/A',
            }
            const rows = checks
              .map(
                c =>
                  `| ${c.name} | ${c.status_code} | ${c.pass ? 'PASS' : 'FAIL'} | ${String(c.details || '').replaceAll('|', '\\|')} |`,
              )
              .join('\n')
            const md = `${marker}

          ## Agent E2E: ${status === 'pass' ? 'PASS' : 'FAIL'}

          _Claude step failed; deterministic fallback executed for reliability._

          - Preview URL: ${base}
          - Latest ticket: ${ticket.identifier}
          - Title: ${ticket.title}
          - Updated: ${ticket.updatedAt}
          - URL: ${ticket.url}
          - State: ${ticket.state}
          - Assignee: ${ticket.assignee}

          | Check | Status | Result | Details |
          | --- | ---: | --- | --- |
          ${rows}

          ${summary}
          `
            fs.writeFileSync('.context/e2e-pr-comment.md', `${md.trim()}\n`, 'utf8')
          })
          NODE

      - name: Prepare PR comment body
        id: prepare-comment
        if: always()
        uses: actions/github-script@v7
        env:
          AGENT_OUTCOME: ${{ steps.run-agent.outcome }}
          PREVIEW_URL: ${{ steps.cloudflare.outputs.preview_url }}
          CHECK_RUN_URL: ${{ steps.cloudflare.outputs.check_run_url }}
        with:
          script: |
            const fs = require('node:fs')
            const marker = '<!-- warden-agent-e2e -->'
            let status = 'fail'
            let body = ''

            const jsonPath = '.context/e2e-agent-result.json'
            const mdPath = '.context/e2e-pr-comment.md'
            let parsed = null
            if (fs.existsSync(jsonPath)) {
              try {
                parsed = JSON.parse(fs.readFileSync(jsonPath, 'utf8'))
              } catch (err) {
                core.warning(`Could not parse ${jsonPath}: ${String(err)}`)
              }
            } else {
              core.warning(`${jsonPath} was not produced by the agent or fallback.`)
            }

            if (parsed?.status === 'pass' && parsed?.latest_ticket?.identifier) {
              status = 'pass'
            } else if (parsed?.status === 'pass') {
              core.warning('Report marked pass but latest_ticket.identifier is missing')
            }

            if (fs.existsSync(mdPath)) {
              body = fs.readFileSync(mdPath, 'utf8').trim()
            } else {
              const headline = status === 'pass' ? 'PASS' : 'FAIL'
              const ticket = parsed?.latest_ticket
              const ticketBlock = ticket
                ? [
                    `- Latest ticket: ${ticket.identifier || 'N/A'}`,
                    `- Title: ${ticket.title || 'N/A'}`,
                    `- Updated: ${ticket.updatedAt || 'N/A'}`,
                    `- State: ${ticket.state || 'N/A'}`,
                    `- Assignee: ${ticket.assignee || 'N/A'}`,
                    `- URL: ${ticket.url || 'N/A'}`,
                  ].join('\n')
                : '- Latest ticket: N/A'
              const agentNote =
                process.env.AGENT_OUTCOME === 'success'
                  ? ''
                  : '- Note: Claude step failed; no fallback report was produced.'
              body = [
                marker,
                '',
                `## Agent E2E: ${headline}`,
                '',
                `- Preview URL: ${process.env.PREVIEW_URL || 'N/A'}`,
                `- Cloudflare check: ${process.env.CHECK_RUN_URL || 'N/A'}`,
                ticketBlock,
                agentNote,
                '',
                parsed?.summary || 'E2E report file was not generated.',
              ]
                .filter(Boolean)
                .join('\n')
            }

            if (!body.includes(marker)) {
              body = `${marker}\n\n${body}`
            }

            const outPath = `${process.env.RUNNER_TEMP}/e2e-pr-comment.md`
            fs.writeFileSync(outPath, `${body.trim()}\n`, 'utf8')

            core.setOutput('status', status)
            core.setOutput('comment_path', outPath)

      - name: Create or update PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMENT_PATH: ${{ steps.prepare-comment.outputs.comment_path }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('node:fs')
            const marker = '<!-- warden-agent-e2e -->'
            const owner = context.repo.owner
            const repo = context.repo.repo
            const issue_number = Number(process.env.PR_NUMBER)
            const body = fs.readFileSync(process.env.COMMENT_PATH, 'utf8')

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            })

            const existing = comments.find(
              c => c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker),
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }

      - name: Fail workflow if agent e2e failed
        if: always()
        run: |
          if [ "${{ steps.prepare-comment.outputs.status }}" != "pass" ]; then
            echo "Agent e2e status is not pass."
            exit 1
          fi
