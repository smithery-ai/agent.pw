name: PR Agent E2E

on:
  check_run:
    types: [completed]

concurrency:
  group: pr-agent-e2e-${{ github.event.check_run.head_sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  agent-e2e:
    if: >
      github.event.check_run.conclusion == 'success' &&
      github.event.check_run.app.slug == 'cloudflare-workers-and-pages' &&
      startsWith(github.event.check_run.name, 'Workers Builds:') &&
      github.event.check_run.pull_requests[0] != null
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract preview metadata from check_run
        id: extract
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            function parsePreviewUrl(summary) {
              if (!summary) return null
              const aliasMatch = summary.match(/Preview Alias URL:\s*(https?:\/\/\S+)/i)
              if (aliasMatch?.[1]) return aliasMatch[1].trim()
              const previewMatch = summary.match(/Preview URL:\s*(https?:\/\/\S+)/i)
              if (previewMatch?.[1]) return previewMatch[1].trim()
              return null
            }

            const checkRun = context.payload.check_run
            const pr = checkRun.pull_requests?.[0]
            if (!pr?.number) {
              throw new Error('No pull request attached to this Cloudflare check_run event.')
            }

            const previewUrl = parsePreviewUrl(checkRun.output?.summary ?? '')
            if (!previewUrl) {
              throw new Error('Cloudflare check_run had no Preview URL in its summary.')
            }

            core.setOutput('preview_url', previewUrl)
            core.setOutput('check_run_url', checkRun.details_url || checkRun.html_url || '')
            core.setOutput('pr_number', String(pr.number))
            core.info(`PR #${pr.number}, preview: ${previewUrl}`)

      - name: Short preview readiness probe
        env:
          PREVIEW_URL: ${{ steps.extract.outputs.preview_url }}
        run: |
          set -euo pipefail
          for i in $(seq 1 12); do
            code="$(curl -sS -o /tmp/e2e-ready-body.txt -w '%{http_code}' "${PREVIEW_URL}/" || true)"
            echo "Attempt ${i}/12: ${code}"
            if [ "${code}" = "200" ] || [ "${code}" = "401" ] || [ "${code}" = "404" ]; then
              echo "Preview is reachable."
              exit 0
            fi
            sleep 10
          done
          echo "Preview URL did not become reachable in time: ${PREVIEW_URL}"
          exit 1

      - name: Build e2e agent prompt
        id: prompt
        env:
          PREVIEW_URL: ${{ steps.extract.outputs.preview_url }}
        run: |
          mkdir -p .context
          PROMPT_FILE="$RUNNER_TEMP/e2e-agent-prompt.txt"

          cat > "$PROMPT_FILE" <<EOF
          You are a CI end-to-end test agent for the Warden API.

          Target preview URL:
          ${PREVIEW_URL}

          Your task:
          1. Use terminal commands (curl) to perform real HTTP requests against that preview.
          2. Run this required check:
             - Discovery auth boundary:
               GET {base}/api.github.com with header Accept: application/json
               PASS only if:
               - HTTP status is exactly 401
               - response is JSON
               - JSON indicates an auth/discovery response (for example includes any of: "auth_url", "auth_options", "docs", "proxy", or "error")
          3. Mark overall result as PASS only if the required check passes. Otherwise mark FAIL.
          4. Write result JSON to .context/e2e-agent-result.json with this shape:
             {
               "status": "pass" | "fail",
               "summary": "short single-line summary",
               "preview_url": "...",
               "checks": [
                 {
                   "name": "...",
                   "request": "...",
                   "status_code": 200,
                   "pass": true,
                   "details": "..."
                 }
               ]
             }
          5. Write a PR comment draft to .context/e2e-pr-comment.md.
             The comment MUST begin with this marker:
             <!-- warden-agent-e2e -->
             Then include:
             - Title: "## Agent E2E: PASS" or "## Agent E2E: FAIL"
             - Preview URL
             - A markdown table with each check, status code, and pass/fail
             - A short summary paragraph

          Important constraints:
          - Only write files under .context/
          - Do not edit source files
          - Be concise and factual
          EOF

          {
            echo "value<<EOF"
            cat "$PROMPT_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Haiku 4.5 e2e agent
        id: run-agent
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
        with:
          prompt: ${{ steps.prompt.outputs.value }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          claude_args: |
            --dangerously-skip-permissions
            --max-turns 20
            --model claude-haiku-4-5
          show_full_output: "true"

      - name: Prepare PR comment body
        id: prepare-comment
        if: always()
        uses: actions/github-script@v7
        env:
          AGENT_OUTCOME: ${{ steps.run-agent.outcome }}
          PREVIEW_URL: ${{ steps.extract.outputs.preview_url }}
          CHECK_RUN_URL: ${{ steps.extract.outputs.check_run_url }}
        with:
          script: |
            const fs = require('node:fs')
            const marker = '<!-- warden-agent-e2e -->'
            let status = 'fail'
            let body = ''

            const jsonPath = '.context/e2e-agent-result.json'
            const mdPath = '.context/e2e-pr-comment.md'

            if (process.env.AGENT_OUTCOME !== 'success') {
              body = `${marker}

            ## Agent E2E: FAIL

            Claude agent execution failed before producing a valid e2e report.

            - Preview URL: ${process.env.PREVIEW_URL || 'N/A'}
            - Cloudflare check: ${process.env.CHECK_RUN_URL || 'N/A'}`
            } else {
              let parsed = null
              if (fs.existsSync(jsonPath)) {
                try {
                  parsed = JSON.parse(fs.readFileSync(jsonPath, 'utf8'))
                } catch (err) {
                  core.warning(`Could not parse ${jsonPath}: ${String(err)}`)
                }
              } else {
                core.warning(`${jsonPath} was not produced by the agent.`)
              }

              if (parsed?.status === 'pass') status = 'pass'

              if (fs.existsSync(mdPath)) {
                body = fs.readFileSync(mdPath, 'utf8').trim()
              } else {
                const headline = status === 'pass' ? 'PASS' : 'FAIL'
                body = `${marker}

            ## Agent E2E: ${headline}

            - Preview URL: ${process.env.PREVIEW_URL || 'N/A'}
            - Cloudflare check: ${process.env.CHECK_RUN_URL || 'N/A'}

            ${parsed?.summary || 'Agent report file was not generated.'}`
              }

              if (!body.includes(marker)) {
                body = `${marker}\n\n${body}`
              }
            }

            const outPath = `${process.env.RUNNER_TEMP}/e2e-pr-comment.md`
            fs.writeFileSync(outPath, `${body.trim()}\n`, 'utf8')

            core.setOutput('status', status)
            core.setOutput('comment_path', outPath)

      - name: Create or update PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.extract.outputs.pr_number }}
          COMMENT_PATH: ${{ steps.prepare-comment.outputs.comment_path }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('node:fs')
            const marker = '<!-- warden-agent-e2e -->'
            const owner = context.repo.owner
            const repo = context.repo.repo
            const issue_number = Number(process.env.PR_NUMBER)
            const body = fs.readFileSync(process.env.COMMENT_PATH, 'utf8')

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            })

            const existing = comments.find(
              c => c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker),
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }

      - name: Fail workflow if agent e2e failed
        if: always()
        run: |
          if [ "${{ steps.prepare-comment.outputs.status }}" != "pass" ]; then
            echo "Agent e2e status is not pass."
            exit 1
          fi
