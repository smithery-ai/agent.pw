name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_ref:
        description: Git ref to publish from
        required: true
        default: agent.pw-v0.1.0
      dry_run:
        description: Run npm publish with --dry-run
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      cli_release_created: ${{ steps.release.outputs['packages/cli--release_created'] }}
      cli_tag_name: ${{ steps.release.outputs['packages/cli--tag_name'] }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          manifest-file: '.release-please-manifest.json'
          config-file: 'release-please-config.json'

  build-local-server-binaries:
    needs: release-please
    if: github.event_name == 'push' && needs.release-please.outputs.cli_release_created == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: darwin-arm64
            runner: macos-15
            file_name: agentpw-local-server-darwin-arm64
          - key: darwin-x64
            runner: macos-15-intel
            file_name: agentpw-local-server-darwin-x64
          - key: linux-arm64
            runner: ubuntu-24.04-arm
            file_name: agentpw-local-server-linux-arm64
          - key: linux-x64
            runner: ubuntu-24.04
            file_name: agentpw-local-server-linux-x64
          - key: win32-x64
            runner: windows-2025
            file_name: agentpw-local-server-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.cli_tag_name }}
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/build-local-server-binary.mjs --outfile release-assets/${{ matrix.file_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: local-server-${{ matrix.key }}
          path: release-assets/${{ matrix.file_name }}

  publish-cli:
    needs:
      - release-please
      - build-local-server-binaries
    if: github.event_name == 'push' && needs.release-please.outputs.cli_release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.cli_tag_name }}
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          pattern: local-server-*
          path: release-assets
          merge-multiple: true
      - name: Generate local server manifest
        run: |
          VERSION="${TAG#agent.pw-v}"
          node packages/cli/scripts/generate-server-binary-manifest.mjs \
            --version "$VERSION" \
            --asset darwin-arm64=release-assets/agentpw-local-server-darwin-arm64 \
            --asset darwin-x64=release-assets/agentpw-local-server-darwin-x64 \
            --asset linux-arm64=release-assets/agentpw-local-server-linux-arm64 \
            --asset linux-x64=release-assets/agentpw-local-server-linux-x64 \
            --asset win32-x64=release-assets/agentpw-local-server-windows-x64.exe
        env:
          TAG: ${{ needs.release-please.outputs.cli_tag_name }}
      - run: pnpm --filter agent.pw compile
      - run: npm publish --provenance --access public
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Upload local server binaries to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.cli_tag_name }}
        run: gh release upload "$TAG" release-assets/* --clobber

  build-local-server-binaries-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: darwin-arm64
            runner: macos-15
            file_name: agentpw-local-server-darwin-arm64
          - key: darwin-x64
            runner: macos-15-intel
            file_name: agentpw-local-server-darwin-x64
          - key: linux-arm64
            runner: ubuntu-24.04-arm
            file_name: agentpw-local-server-linux-arm64
          - key: linux-x64
            runner: ubuntu-24.04
            file_name: agentpw-local-server-linux-x64
          - key: win32-x64
            runner: windows-2025
            file_name: agentpw-local-server-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_ref }}
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/build-local-server-binary.mjs --outfile release-assets/${{ matrix.file_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: local-server-manual-${{ matrix.key }}
          path: release-assets/${{ matrix.file_name }}

  publish-cli-manual:
    needs: build-local-server-binaries-manual
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_ref }}
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          pattern: local-server-manual-*
          path: release-assets
          merge-multiple: true
      - name: Generate local server manifest
        run: |
          VERSION="${TAG#agent.pw-v}"
          node packages/cli/scripts/generate-server-binary-manifest.mjs \
            --version "$VERSION" \
            --asset darwin-arm64=release-assets/agentpw-local-server-darwin-arm64 \
            --asset darwin-x64=release-assets/agentpw-local-server-darwin-x64 \
            --asset linux-arm64=release-assets/agentpw-local-server-linux-arm64 \
            --asset linux-x64=release-assets/agentpw-local-server-linux-x64 \
            --asset win32-x64=release-assets/agentpw-local-server-windows-x64.exe
        env:
          TAG: ${{ inputs.release_ref }}
      - run: pnpm --filter agent.pw compile
      - if: ${{ inputs.dry_run }}
        run: npm publish --provenance --access public --dry-run
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - if: ${{ !inputs.dry_run }}
        run: npm publish --provenance --access public
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - if: ${{ !inputs.dry_run }}
        name: Upload local server binaries to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.release_ref }}
        run: gh release upload "$TAG" release-assets/* --clobber
